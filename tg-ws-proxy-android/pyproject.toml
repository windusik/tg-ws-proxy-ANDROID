# This project was generated with 0.4.1 using template: https://github.com/beeware/briefcase-template @ v0.4.1
[tool.briefcase]
project_name = "TG-WS-Proxy-Android"
bundle = "soft.shadlv"
version = "0.0.1"
url = "https://github.com/Flowseal/tg-ws-proxy"
license.file = "LICENSE"
author = "ShadowLev"
author_email = "salmin.leva@gmail.com"
icon = "icons/icon"

[tool.briefcase.app.tg-ws-proxy-android]
formal_name = "Telegram WS Proxy for Android"
description = "WebSocket proxy for Telegram based on Flowseal's solution"
sources = [
    "src/tg_ws_proxy_android",
]
test_sources = [
    "tests",
]

requires = [
    "cryptography"
]
test_requires = [
    "pytest",
]

[tool.briefcase.app.tg-ws-proxy-android.macOS]
universal_build = true
requires = [
    "toga-cocoa~=0.5.0",
    "std-nslog~=1.0.3",
]

[tool.briefcase.app.tg-ws-proxy-android.linux]
requires = [
    "toga-gtk~=0.5.0",
    # PyGObject 3.52.1 enforces a requirement on libgirepository-2.0-dev. This library
    # isn't available on Debian 12/Ubuntu 22.04. If you don't need to support those (or
    # older) releases, you can remove this version pin. See beeware/toga#3143.
    "pygobject < 3.52.1",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.system.debian]
system_requires = [
    # Needed to compile pycairo wheel
    "libcairo2-dev",
    # One of the following two packages are needed to compile PyGObject wheel. If you
    # remove the pygobject pin in the requires list, you should also change to the
    # version 2.0 of the girepository library. See beeware/toga#3143.
    "libgirepository1.0-dev",
    # "libgirepository-2.0-dev",
]

system_runtime_requires = [
    # Needed to provide GTK and its GI bindings
    "gir1.2-gtk-3.0",
    # One of the following two packages are needed to use PyGObject at runtime. If you
    # remove the pygobject pin in the requires list, you should also change to the
    # version 2.0 of the girepository library. See beeware/toga#3143.
    "libgirepository-1.0-1",
    # "libgirepository-2.0-0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # Note: Debian 11 requires gir1.2-webkit2-4.0 instead
    # "gir1.2-webkit2-4.1",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.system.rhel]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo-gobject-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
]

system_runtime_requires = [
    # Needed to support Python bindings to GTK
    "gobject-introspection",
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk3",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.system.suse]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to support Python bindings to GTK
    "gobject-introspection", "typelib(Gtk) = 3.0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # "libwebkit2gtk3", "typelib(WebKit2)",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.system.arch]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo",
    # Needed to compile PyGObject wheel
    "gobject-introspection",
    # Runtime dependencies that need to exist so that the
    # Arch package passes final validation.
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2
    # "webkit2gtk",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to provide PyGObject bindings
    "gobject-introspection-runtime",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.appimage]
manylinux = "manylinux_2_28"

system_requires = [
    # Needed to compile pycairo wheel
    "cairo-gobject-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
    # Needed to provide GTK
    "gtk3-devel",
    # Dependencies that GTK looks for at runtime, that need to be
    # in the build environment to be picked up by linuxdeploy
    "libcanberra-gtk3",
    "PackageKit-gtk3-module",
    "gvfs-client",
]

linuxdeploy_plugins = [
    "DEPLOY_GTK_VERSION=3 gtk",
]

[tool.briefcase.app.tg-ws-proxy-android.linux.flatpak]
flatpak_runtime = "org.gnome.Platform"
flatpak_runtime_version = "48"
flatpak_sdk = "org.gnome.Sdk"

[tool.briefcase.app.tg-ws-proxy-android.windows]
requires = [
    "toga-winforms~=0.5.0",
    "cryptography"
]

# Mobile deployments
[tool.briefcase.app.tg-ws-proxy-android.iOS]
requires = [
    "toga-iOS~=0.5.0",
    "std-nslog~=1.0.3",
    "cryptography"
]

[tool.briefcase.app.tg-ws-proxy-android.android]
requires = [
    "toga-android~=0.5.0",
    "cryptography"
]

permission."android.permission.POST_NOTIFICATIONS" = true
permission."android.permission.FOREGROUND_SERVICE" = true

base_theme = "Theme.MaterialComponents.Light.DarkActionBar"
build_gradle_dependencies = [
    "com.google.android.material:material:1.13.0",
    "androidx.core:core:1.9.0", "androidx.appcompat:appcompat:1.6.1"
]

# Needed for WebView
# build_gradle_extra_content="""
# chaquopy.defaultConfig.staticProxy("toga_android.widgets.internal.webview")
# """

# Web deployments
[tool.briefcase.app.tg-ws-proxy-android.web]
requires = [
    "toga-web~=0.5.0",
]

